<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KP Header Example</title>
    <link rel="stylesheet" href="/styles/styles.css" />
    <link rel="stylesheet" href="/blocks/kp-header/kp-header.css" />
    <script type="module" src="/scripts/scripts.js"></script>
  </head>
  <body>
    <header>
      <div class="kp-header block" data-block-name="kp-header" data-block-status="loading">
        <div>
          <div>
            <img src="/icons/kp-logo.svg" alt="Kaiser Permanente" />
          </div>
        </div>
        <div>
          <div>English</div>
          <div>en</div>
        </div>
        <div>
          <div>Español</div>
          <div>es</div>
        </div>
      </div>
    </header>

    <main>
      <div class="section">
        <div>
          <h1>Welcome to Kaiser Permanente</h1>
          <p>This demo page shows the kp-header block with the complete Kaiser Permanente logo.</p>
        </div>
      </div>
    </main>
  </body>
</html>
